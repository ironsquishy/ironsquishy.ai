base_model: "google/gemma-4-E2B-it"
train_file: "data/processed/train.jsonl"
output_dir: "adapters/latest"

max_length: 512
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
num_train_epochs: 2
learning_rate: 0.0002
logging_steps: 10
save_steps: 100
warmup_ratio: 0.03
weight_decay: 0.01
fp16: true

lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules: "all-linear"