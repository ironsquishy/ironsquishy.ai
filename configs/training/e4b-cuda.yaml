inherits: "configs/base/training.yaml"

base_model: "google/gemma-4-E4B-it"
output_dir: "adapters/gemma4-e4b-latest"

num_train_epochs: 1
lora_r: 4
lora_alpha: 8

device_overrides:
  cuda:
    max_length: 256
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 32
    use_4bit: true
    fp16: true